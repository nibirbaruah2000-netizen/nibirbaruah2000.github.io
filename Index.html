<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balance Dashboard</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #1e1e2f;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background-color: #2a2a40;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    width: 320px;
    text-align: center;
  }
  .hidden {
    display: none !important;
  }
  h1, h2 {
    margin-top: 0;
  }
  .balance-container {
    font-size: 32px;
    font-weight: bold;
    color: #4caf50;
    margin: 20px 0;
    background: #1e1e2f;
    padding: 15px;
    border-radius: 8px;
  }
  button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    transition: background-color 0.2s;
  }
  button:hover {
    background-color: #0056b3;
  }
  .btn-secondary {
    background-color: #6c757d;
  }
  .btn-secondary:hover {
    background-color: #5a6268;
  }
  input {
    width: calc(100% - 24px);
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #444;
    border-radius: 6px;
    background-color: #1e1e2f;
    color: white;
    font-size: 14px;
  }
  input:focus {
    outline: none;
    border-color: #007bff;
  }
  .message {
    margin-top: 15px;
    font-size: 14px;
    color: #ff9800;
  }
  .success {
    color: #4caf50;
  }
</style>
</head>
<body>

<div class="container">
  <div id="start-screen">
    <h2>Welcome</h2>
    <p>Click below to access your dashboard.</p>
    <button id="btn-start">Get Started</button>
  </div>

  <div id="main-screen" class="hidden">
    <h2>Account Balance</h2>
    <div class="balance-container">
      $<span id="balance">0</span>
    </div>
    
    <button id="btn-promo">Promo</button>
    <button id="btn-withdraw" class="btn-secondary">Withdraw</button>

    <div id="promo-box" class="hidden">
      <input type="text" id="promo-input" placeholder="Enter promo code">
      <button id="btn-submit-promo">Redeem Code</button>
      <div id="promo-msg" class="message"></div>
    </div>

    <div id="withdraw-box" class="hidden">
      <input type="text" id="btc-input" placeholder="Enter BTC Wallet Address">
      <button id="btn-confirm-withdraw">Confirm</button>
    </div>

    <div id="global-msg" class="message hidden"></div>
  </div>
</div>

<script>
  // Variables to hold state
  let currentBalance = 0;

  // Screen Elements
  const startScreen = document.getElementById('start-screen');
  const mainScreen = document.getElementById('main-screen');
  const balanceDisplay = document.getElementById('balance');
  
  // Section Elements
  const promoBox = document.getElementById('promo-box');
  const withdrawBox = document.getElementById('withdraw-box');
  const globalMsg = document.getElementById('global-msg');
  const promoMsg = document.getElementById('promo-msg');
  
  // Input Elements
  const promoInput = document.getElementById('promo-input');
  const btcInput = document.getElementById('btc-input');

  // Utility function to hide all dynamic elements
  function hideDynamicBoxes() {
    promoBox.classList.add('hidden');
    withdrawBox.classList.add('hidden');
    globalMsg.classList.add('hidden');
    promoMsg.textContent = '';
  }

  // 1. Get Started Button
  document.getElementById('btn-start').addEventListener('click', () => {
    startScreen.classList.add('hidden');
    mainScreen.classList.remove('hidden');
  });

  // 2. Open Promo Box
  document.getElementById('btn-promo').addEventListener('click', () => {
    hideDynamicBoxes();
    promoBox.classList.remove('hidden');
  });

  // 3. Open Withdraw Box
  document.getElementById('btn-withdraw').addEventListener('click', () => {
    hideDynamicBoxes();
    withdrawBox.classList.remove('hidden');
  });

  // 4. Submit Promo Code
  document.getElementById('btn-submit-promo').addEventListener('click', () => {
    const code = promoInput.value.trim().toUpperCase();
    
    if (code === 'PROMOBTC') {
      currentBalance += 70000;
      // Format number to include commas
      balanceDisplay.textContent = currentBalance.toLocaleString();
      promoMsg.textContent = 'Promo code applied successfully!';
      promoMsg.className = 'message success';
      promoInput.value = ''; // clear input
    } else {
      promoMsg.textContent = 'Invalid promo code.';
      promoMsg.className = 'message'; // revert to default orange color
    }
  });

  // 5. Confirm Withdraw
  document.getElementById('btn-confirm-withdraw').addEventListener('click', () => {
    const wallet = btcInput.value.trim();
    
    if (wallet === '') {
      alert('Please enter a valid BTC wallet address.');
      return;
    }

    hideDynamicBoxes();
    
    // Show the confirmation text
    globalMsg.textContent = 'Reward confirmation in progress please wait...';
    globalMsg.classList.remove('hidden');
    
    btcInput.value = ''; // clear input
  });
</script>

</body>
</html>
